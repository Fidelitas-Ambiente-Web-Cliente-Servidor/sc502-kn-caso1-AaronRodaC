<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Ficticio</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body>

    <header>
        <h1>Restaurante R.O.C.A</h1>
        <p>Menú de platillos y reservas en línea</p>
    </header>

    <main>
        <!-- Sección del menú -->
        <section class="seccion">
            <h2>Menú del Restaurante</h2>

            <div class="filtros">
                <button class="btn-filtro activo" data-categoria="Todos">Todos</button>
                <button class="btn-filtro" data-categoria="Entrada">Entradas</button>
                <button class="btn-filtro" data-categoria="Plato Fuerte">Platos Fuertes</button>
                <button class="btn-filtro" data-categoria="Postre">Postres</button>
            </div>

            <div id="contenedorMenu" class="contenedor-menu">
            </div>
        </section>

        <!-- Sección de reservas -->
        <section class="seccion">
            <h2>Formulario de Reservas</h2>

            <form id="formReserva" novalidate>
                <div class="grupo-campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre">
                    <p id="errorNombre" class="error-campo"></p>
                </div>

                <div class="grupo-campo">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo">
                    <p id="errorCorreo" class="error-campo"></p>
                </div>

                <div class="grupo-campo">
                    <label for="fecha">Fecha de reserva</label>
                    <input type="date" id="fecha" name="fecha">
                    <p id="errorFecha" class="error-campo"></p>
                </div>

                <div class="grupo-campo">
                    <label for="hora">Hora</label>
                    <select id="hora" name="hora">
                        <option value="">Seleccione una hora</option>
                        <option value="12:00">12:00</option>
                        <option value="13:00">13:00</option>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                    </select>
                    <p id="errorHora" class="error-campo"></p>
                </div>

                <div class="grupo-campo">
                    <label for="personas">Número de personas</label>
                    <input type="number" id="personas" name="personas" min="1" max="20">
                    <p id="errorPersonas" class="error-campo"></p>
                </div>

                <div class="grupo-campo">
                    <label for="comentarios">Comentarios</label>
                    <textarea id="comentarios" name="comentarios"></textarea>
                </div>

                <button type="submit" id="btnEnviar" disabled>Enviar reserva</button>
            </form>
        </section>

        <!-- Tabla de reservas -->
        <section class="seccion">
            <h2>Reservas Registradas</h2>

            <div class="tabla-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Personas</th>
                        </tr>
                    </thead>
                    <tbody id="tablaReservas">
                    </tbody>
                </table>
            </div>

            <div id="resumenReservas" class="resumen-reservas">
            </div>
        </section>
    </main>

</body>
</html>
